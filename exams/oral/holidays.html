<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holidays</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f8f1;
      --surface: #fffdee;
      --ink: #103a2d;
      --accent: #009c3b;
      --accent-light: #ffcc29;
      --muted: #3e5f3d;
      --border: #c7d8b6;
      --fs: 22px;
    }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--ink);
      color: var(--bg);
      padding: 18px 24px 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.3rem, 4vw, 2rem);
      letter-spacing: 0.04em;
      color: var(--accent-light);
      line-height: 1.1;
    }

    header p {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    .controls {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .select-wrap {
      position: relative;
      flex: 1 1 100%;
      max-width: 420px;
    }

    select {
      width: 100%;
      appearance: none;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 6px;
      font-family: 'Source Serif 4', serif;
      font-size: 1rem;
      color: var(--ink);
      padding: 10px 40px 10px 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .select-arrow {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--accent);
      font-size: 1.1rem;
    }

    .font-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .font-controls span {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .btn {
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      width: 44px;
      height: 44px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      background: var(--accent);
    }

    .btn:active {
      transform: scale(0.92);
    }

    .btn-sm {
      width: 34px;
      height: 34px;
      font-size: 1rem;
    }

    .size-display {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 400;
      min-width: 36px;
      text-align: center;
    }

    /* ── TTS Controls ────────────────────── */
    .tts-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tts-playback {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-tts-play {
      background: var(--accent) !important;
      color: #fff !important;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.4rem;
    }

    .btn-tts-play:hover {
      background: #007533 !important;
    }

    .btn-tts-stop {
      background: #3e5f3d !important;
      color: #fff !important;
    }

    .btn-tts-stop:hover {
      background: #2a4b2c !important;
    }

    .speed-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .speed-wrap .speed-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .speed-display {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      min-width: 42px;
      text-align: center;
    }

    .tts-separator {
      width: 1.5px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    .tts-status {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-width: 60px;
      text-align: center;
    }

    .tts-status.speaking {
      color: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ── Word highlight ──────────────────── */
    .word-highlight {
      background: linear-gradient(135deg, #daf3c9 0%, #ffec8a 100%);
      border-radius: 4px;
      padding: 2px 3px;
      margin: 0 -3px;
      transition: background 0.15s ease;
    }

    main {
      flex: 1;
      padding: 32px 20px 60px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      max-width: 720px;
      width: 100%;
      padding: clamp(24px, 5vw, 48px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .topic-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .topic-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.2rem, 3.5vw, 1.7rem);
      color: var(--accent);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--border);
      line-height: 1.3;
    }

    .exam-text {
      font-size: var(--fs);
      line-height: 1.75;
      color: var(--ink);
      transition: font-size 0.2s ease;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    .placeholder {
      text-align: center;
      padding: 40px 20px;
    }

    .placeholder-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .placeholder h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .placeholder p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Tablet ────────────────────────── */
    @media (max-width: 768px) {
      .controls {
        padding: 12px 16px;
        gap: 8px;
      }

      .select-wrap {
        flex: 1 1 100%;
        max-width: 100%;
      }

      .controls-row {
        justify-content: center;
      }

      .tts-separator {
        display: none;
      }
    }

    /* ── Mobile ────────────────────────── */
    @media (max-width: 480px) {
      :root {
        --fs: 19px;
      }

      header {
        padding: 12px 16px 10px;
      }

      header h1 {
        font-size: 1.3rem;
      }

      .controls {
        padding: 10px 12px;
        gap: 8px;
        flex-direction: column;
      }

      .select-wrap {
        flex: 1 1 100%;
        max-width: 100%;
      }

      select {
        font-size: 1rem;
        padding: 12px 40px 12px 14px;
      }

      .controls-row {
        width: 100%;
        justify-content: center;
        gap: 8px;
      }

      .font-controls {
        gap: 4px;
      }

      .font-controls span {
        font-size: 0.7rem;
      }

      .tts-separator {
        display: none;
      }

      .tts-bar {
        width: 100%;
        justify-content: center;
        gap: 8px;
        padding: 6px 0;
        border-top: 1px solid var(--border);
        margin-top: 2px;
      }

      .btn-tts-play {
        width: 52px;
        height: 52px;
        font-size: 1.5rem;
      }

      .speed-display {
        font-size: 0.9rem;
        min-width: 44px;
      }

      .tts-status {
        width: 100%;
        text-align: center;
        font-size: 0.8rem;
      }

      main {
        padding: 16px 10px 40px;
      }

      .card {
        padding: 18px 16px;
        border-radius: 8px;
      }

      .topic-title {
        font-size: 1.1rem;
        margin-bottom: 16px;
        padding-bottom: 12px;
      }

      .exam-text {
        line-height: 1.85;
      }
    }

    /* ── Very small phones ─────────────── */
    @media (max-width: 360px) {
      :root {
        --fs: 17px;
      }

      header h1 {
        font-size: 1.15rem;
      }

      .controls {
        padding: 8px 10px;
      }

      .card {
        padding: 14px 12px;
      }
    }

    /* ── Active TTS word highlight ───────────── */
    .tts-active {
      background: linear-gradient(135deg, #e7f5ce 0%, #fff4a0 100%);
      border-radius: 4px;
      padding: 2px 4px;
    }

    .word-hint {
      margin: 12px 0 18px;
      padding: 10px 14px;
      border: 1.5px dashed var(--accent-light);
      background: #fff8d5;
      border-radius: 8px;
      font-size: .85rem;
    }

    /* ── Tip banner ───────────────────────── */
    .word-tip {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(255, 204, 41, 0.18) 0%, rgba(255, 204, 41, 0.08) 100%);
      border: 1px solid rgba(255, 204, 41, 0.35);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.4;
      animation: fadeIn 0.4s ease;
    }

    .word-tip-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .word-tip-dismiss {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 2px;
      opacity: 0.6;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .word-tip-dismiss:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <header>
    <h1>Holidays</h1>
    <p>Basic III</p>
  </header>

  <div class="controls">
    <div class="select-wrap">
      <select id="studentSelect" onchange="showText()">
        <option value="">— Select a holiday —</option>
        <option value="Christmas">Christmas</option>
        <option value="Halloween">Halloween</option>
        <option value="New Year's Eve">New Year's Eve</option>
        <option value="Birthdays">Birthdays</option>
        <option value="Thanksgiving">Thanksgiving</option>
        <option value="Valentine's Day">Valentine's Day</option>
        <option value="Easter">Easter</option>
        <option value="Mother's Day">Mother's Day</option>
        <option value="Father's Day">Father's Day</option>
      </select>
      <span class="select-arrow">▾</span>
    </div>

    <div class="controls-row">
      <div class="font-controls">
        <span>Size</span>
        <button class="btn btn-sm" onclick="changeFont(-2)" aria-label="Decrease font size">−</button>
        <span class="size-display" id="sizeDisplay">22</span>
        <button class="btn btn-sm" onclick="changeFont(2)" aria-label="Increase font size">+</button>
      </div>

      <div class="tts-separator"></div>

      <div class="tts-bar">
        <div class="tts-playback">
          <button class="btn btn-tts-play" id="btnPlay" onclick="toggleSpeech()" aria-label="Read aloud"
            title="Read aloud">▶</button>
          <button class="btn btn-tts-stop" id="btnStop" onclick="stopSpeech()" aria-label="Stop reading"
            title="Stop">■</button>
        </div>
        <div class="speed-wrap">
          <span class="speed-label">Speed</span>
          <button class="btn btn-sm" onclick="changeSpeed(-0.25)" aria-label="Decrease speed">−</button>
          <span class="speed-display" id="speedDisplay">0.85×</span>
          <button class="btn btn-sm" onclick="changeSpeed(0.25)" aria-label="Increase speed">+</button>
        </div>
        <span class="tts-status" id="ttsStatus"></span>
      </div>
    </div>
  </div>

  <main>
    <div class="card" id="card">
      <div class="placeholder">
        <div class="placeholder-icon">📖</div>
        <h2>Ready to read?</h2>
        <p>Select a student's name above to display their speech.</p>
      </div>
    </div>
  </main>

  <script>
    const data = {
      "Christmas": {
        topic: "Christmas",
        text: "Christmas is a magical time for families to gather. People decorate trees with lights and exchange  gifts. It is a season of joy and delicious food shared around a cozy fireplace."
      },
      "Halloween": {
        topic: "Halloween",
        text: "Halloween brings excitement with creative costumes and spooky decorations. Children go trick-or-treating while carved pumpkins glow on doorsteps. It is a night full of mystery, fun, and playful ghosts."
      },
      "New Year's Eve": {
        topic: "New Year's Eve",
        text: "New Year's Eve is celebrated with vibrant fireworks and midnight countdowns. People toast with glasses to welcome new beginnings. It is a loud and colorful time spent celebrating with friends."
      },
      "Birthdays": {
        topic: "Birthdays",
        text: "Birthdays are special days to celebrate another year of life. Parties often include colorful balloons, a sweet cake with candles, and many wrapped presents. It is a wonderful occasion for everyone."
      },
      "Thanksgiving": {
        topic: "Thanksgiving",
        text: "Thanksgiving is centered on gratitude and a massive feast. Families enjoy a large dinner featuring a roasted turkey and seasonal sides. It is an important moment to reflect on blessings and enjoy time together."
      },
      "Valentine's Day": {
        topic: "Valentine's Day",
        text: "Valentine's Day is a special occasion to celebrate love and friendship. Many people exchange cards, flowers, and chocolate gifts. It is a day to express appreciation for those we care about."
      },
      "Easter": {
        topic: "Easter",
        text: "Easter is a beautiful spring holiday celebrated with colorful eggs and chocolate bunnies. Children enjoy exciting egg hunts in the garden. It is a time for renewal, joy, and spending time with loved ones."
      },
      "Mother's Day": {
        topic: "Mother's Day",
        text: "Mother’s Day is a special occasion to show love and gratitude to mothers. Families often give flowers, cards, or handmade gifts. It is a day dedicated to honoring the most caring figures in our lives."
      },
      "Father's Day": {
        topic: "Father's Day",
        text: "Father’s Day is a wonderful time to celebrate the hard work and support of fathers. Many families enjoy outdoor barbecues or share meaningful gifts. It is a day to recognize and appreciate paternal bonds."
      }
    };

    let fontSize = 22;
    const MIN = 14, MAX = 48;
    let speechRate = 0.85;
    const SPEED_MIN = 0.25, SPEED_MAX = 2;
    let currentUtterance = null;
    let isSpeaking = false;
    let isPaused = false;
    let currentText = '';
    let speechGeneration = 0; // prevents stale callbacks
    let tipDismissed = false;

    function showText() {
      stopSpeech();
      const name = document.getElementById('studentSelect').value;
      const card = document.getElementById('card');
      if (!name) {
        card.innerHTML = `<div class="placeholder"><div class="placeholder-icon">📖</div><h2>Ready to read?</h2><p>Select a student's name above to display their exam text.</p></div>`;
        currentText = '';
        return;
      }
      const entry = data[name];
      currentText = entry.text;
      const tipHTML = tipDismissed ? '' : `
        <div class="word-tip" id="wordTip">
          <span class="word-tip-icon">💡</span>
          <span>Tap or double click any word to hear its pronunciation individually.</span>
          <button class="word-tip-dismiss" onclick="dismissTip()" aria-label="Dismiss tip">✕</button>
        </div>`;
      card.innerHTML = `
      <div class="topic-label">Topic</div>
      <div class="topic-title">${entry.topic}</div>
      
      <p class="exam-text" id="examText" style="font-size:${fontSize}px">${entry.text}</p>
      ${tipHTML}
    `;
    }

    function dismissTip() {
      tipDismissed = true;
      const tip = document.getElementById('wordTip');
      if (tip) tip.style.display = 'none';
    }

    function changeFont(delta) {
      fontSize = Math.min(MAX, Math.max(MIN, fontSize + delta));
      document.documentElement.style.setProperty('--fs', fontSize + 'px');
      document.getElementById('sizeDisplay').textContent = fontSize;
      const t = document.getElementById('examText');
      if (t) t.style.fontSize = fontSize + 'px';
    }

    /* ── Text-to-Speech ────────────────────── */

    function getEnglishVoice() {
      const voices = speechSynthesis.getVoices();
      // Prefer high-quality English voices
      const preferred = voices.find(v => v.lang.startsWith('en') && v.name.includes('Karen'));
      if (preferred) return preferred;
      // Prefer non-local (network) voices for better quality
      const networkEn = voices.find(v => v.lang.startsWith('en') && !v.localService);
      if (networkEn) return networkEn;
      return voices.find(v => v.lang.startsWith('en')) || null;
    }

    function wrapWordsInSpans(text) {
      const words = text.split(/\s+/);
      return words.map((w, i) => `<span class="tts-word" data-index="${i}">${w}</span>`).join(' ');
    }

    function highlightWord(index) {
      document.querySelectorAll('.tts-word.word-highlight').forEach(el => {
        el.classList.remove('word-highlight');
      });
      const target = document.querySelector(`.tts-word[data-index="${index}"]`);
      if (target) {
        target.classList.add('word-highlight');
        target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function clearHighlights() {
      document.querySelectorAll('.tts-word.word-highlight').forEach(el => {
        el.classList.remove('word-highlight');
      });
    }

    function updateTTSUI(state) {
      const btnPlay = document.getElementById('btnPlay');
      const status = document.getElementById('ttsStatus');

      switch (state) {
        case 'playing':
          btnPlay.textContent = '⏸';
          btnPlay.title = 'Pause';
          status.textContent = '🔊 Reading…';
          status.classList.add('speaking');
          break;
        case 'paused':
          btnPlay.textContent = '▶';
          btnPlay.title = 'Resume';
          status.textContent = '⏸ Paused';
          status.classList.remove('speaking');
          break;
        case 'idle':
        default:
          btnPlay.textContent = '▶';
          btnPlay.title = 'Read aloud';
          status.textContent = '';
          status.classList.remove('speaking');
          break;
      }
    }

    function toggleSpeech() {
      if (!currentText) return;

      if (isSpeaking && !isPaused) {
        speechSynthesis.pause();
        isPaused = true;
        updateTTSUI('paused');
        return;
      }

      if (isPaused) {
        speechSynthesis.resume();
        isPaused = false;
        updateTTSUI('playing');
        return;
      }

      startSpeech();
    }

    function startSpeech() {
      // Increment generation so any old callbacks become no-ops
      const gen = ++speechGeneration;

      // Cancel without triggering our own cleanup logic
      speechSynthesis.cancel();

      const examEl = document.getElementById('examText');
      if (!examEl || !currentText) return;

      // Wrap each word in a <span> for highlighting
      examEl.innerHTML = wrapWordsInSpans(currentText);
      examEl.style.fontSize = fontSize + 'px';

      const utterance = new SpeechSynthesisUtterance(currentText);
      utterance.lang = 'en-US';
      utterance.rate = speechRate;
      utterance.pitch = 1;

      const voice = getEnglishVoice();
      if (voice) utterance.voice = voice;

      const words = currentText.split(/\s+/);

      utterance.onboundary = function (e) {
        if (gen !== speechGeneration) return; // stale
        if (e.name === 'word') {
          const charIndex = e.charIndex;
          let cumulative = 0;
          for (let i = 0; i < words.length; i++) {
            if (cumulative >= charIndex) {
              highlightWord(i);
              break;
            }
            cumulative += words[i].length + 1;
          }
        }
      };

      utterance.onend = function () {
        if (gen !== speechGeneration) return; // stale — ignore
        isSpeaking = false;
        isPaused = false;
        clearHighlights();
        if (examEl) examEl.textContent = currentText;
        updateTTSUI('idle');
      };

      utterance.onerror = function (e) {
        if (gen !== speechGeneration) return; // stale — ignore
        // 'interrupted' and 'canceled' are expected when restarting
        if (e.error === 'interrupted' || e.error === 'canceled') return;
        isSpeaking = false;
        isPaused = false;
        clearHighlights();
        updateTTSUI('idle');
      };

      currentUtterance = utterance;
      isSpeaking = true;
      isPaused = false;
      updateTTSUI('playing');

      // Small delay to let cancel() complete before speaking again
      setTimeout(() => {
        if (gen !== speechGeneration) return;
        speechSynthesis.speak(utterance);
      }, 50);
    }

    function stopSpeech() {
      speechGeneration++; // invalidate any pending callbacks
      speechSynthesis.cancel();
      isSpeaking = false;
      isPaused = false;
      clearHighlights();
      updateTTSUI('idle');

      const examEl = document.getElementById('examText');
      if (examEl && currentText) {
        examEl.textContent = currentText;
        examEl.style.fontSize = fontSize + 'px';
      }
    }

    function changeSpeed(delta) {
      speechRate = Math.min(SPEED_MAX, Math.max(SPEED_MIN, +(speechRate + delta).toFixed(2)));
      document.getElementById('speedDisplay').textContent = speechRate + '×';

      // Restart with new speed if currently speaking
      if (isSpeaking && !isPaused) {
        startSpeech();
      }
    }

    // Ensure voices are loaded (some browsers load them async)
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = () => { /* voices ready */ };
    }

    // SINGLE WORD – select a word to hear pronunciation
    document.addEventListener('mouseup', () => {
      const sel = window.getSelection();
      const word = sel.toString().trim();
      if (!word || word.includes(' ') || word.length < 2) return;

      const range = sel.getRangeAt(0);
      const span = document.createElement('span');
      span.className = 'tts-active';
      span.textContent = word;

      range.deleteContents();
      range.insertNode(span);
      sel.removeAllRanges();

      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-US';
      u.rate = Math.max(0.6, speechRate - 0.1);
      const voice = getEnglishVoice();
      if (voice) u.voice = voice;

      u.onend = () => span.replaceWith(word);
      speechSynthesis.speak(u);
    });

    // MOBILE TAP – tap a word to hear its pronunciation
    document.addEventListener('touchend', (e) => {
      if (isSpeaking) return;
      if (e.changedTouches.length !== 1) return;

      const touch = e.changedTouches[0];
      const examEl = document.getElementById('examText');
      if (!examEl) return;

      // Only handle taps inside the exam text
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      if (!target || !examEl.contains(target)) return;

      // Get the text node and offset at the tap point
      let range;
      if (document.caretRangeFromPoint) {
        range = document.caretRangeFromPoint(touch.clientX, touch.clientY);
      } else if (document.caretPositionFromPoint) {
        const pos = document.caretPositionFromPoint(touch.clientX, touch.clientY);
        if (pos) {
          range = document.createRange();
          range.setStart(pos.offsetNode, pos.offset);
          range.setEnd(pos.offsetNode, pos.offset);
        }
      }
      if (!range || !range.startContainer || range.startContainer.nodeType !== 3) return;

      const textNode = range.startContainer;
      const offset = range.startOffset;
      const fullText = textNode.textContent;

      // Find word boundaries around the tap offset
      let start = offset, end = offset;
      while (start > 0 && /\S/.test(fullText[start - 1])) start--;
      while (end < fullText.length && /\S/.test(fullText[end])) end++;

      const word = fullText.slice(start, end).replace(/[.,;:!?"'()]/g, '');
      if (!word || word.length < 2) return;

      // Visual feedback: wrap tapped word in a highlighted span
      const before = fullText.slice(0, start);
      const after = fullText.slice(end);
      const wordRaw = fullText.slice(start, end);

      const span = document.createElement('span');
      span.className = 'tts-active';
      span.textContent = wordRaw;

      const parent = textNode.parentNode;
      const beforeNode = document.createTextNode(before);
      const afterNode = document.createTextNode(after);
      parent.replaceChild(afterNode, textNode);
      parent.insertBefore(span, afterNode);
      parent.insertBefore(beforeNode, span);

      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-US';
      u.rate = Math.max(0.6, speechRate - 0.1);
      const voice = getEnglishVoice();
      if (voice) u.voice = voice;

      u.onend = () => {
        // Restore original text node
        parent.replaceChild(document.createTextNode(before + wordRaw + after), beforeNode);
        // Clean up the span and afterNode if they still exist
        if (span.parentNode) span.remove();
        if (afterNode.parentNode) afterNode.remove();
      };
      u.onerror = u.onend;

      speechSynthesis.speak(u);
    });

  </script>
</body>

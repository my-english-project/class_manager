<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oral Exam 3</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f0e8;
      --surface: #fffdf8;
      --ink: #1a1208;
      --accent: #b5451b;
      --accent-light: #e8c4b3;
      --muted: #7a6a52;
      --border: #d6cdb8;
      --fs: 22px;
    }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--ink);
      color: var(--bg);
      padding: 18px 24px 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.3rem, 4vw, 2rem);
      letter-spacing: 0.04em;
      color: var(--accent-light);
      line-height: 1.1;
    }

    header p {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    .controls {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .select-wrap {
      position: relative;
      flex: 1 1 100%;
      max-width: 420px;
    }

    select {
      width: 100%;
      appearance: none;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 6px;
      font-family: 'Source Serif 4', serif;
      font-size: 1rem;
      color: var(--ink);
      padding: 10px 40px 10px 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .select-arrow {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--accent);
      font-size: 1.1rem;
    }

    .font-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .font-controls span {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .btn {
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      width: 44px;
      height: 44px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      background: var(--accent);
    }

    .btn:active {
      transform: scale(0.92);
    }

    .btn-sm {
      width: 34px;
      height: 34px;
      font-size: 1rem;
    }

    .size-display {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 400;
      min-width: 36px;
      text-align: center;
    }

    /* ── TTS Controls ────────────────────── */
    .tts-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tts-playback {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-tts-play {
      background: var(--accent) !important;
      color: #fff !important;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.4rem;
    }

    .btn-tts-play:hover {
      background: #933812 !important;
    }

    .btn-tts-stop {
      background: var(--muted) !important;
      color: #fff !important;
    }

    .btn-tts-stop:hover {
      background: #5a4e3a !important;
    }

    .speed-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .speed-wrap .speed-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .speed-display {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      min-width: 42px;
      text-align: center;
    }

    .tts-separator {
      width: 1.5px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    .tts-status {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-width: 60px;
      text-align: center;
    }

    .tts-status.speaking {
      color: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ── Word highlight ──────────────────── */
    .word-highlight {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      border-radius: 4px;
      padding: 2px 3px;
      margin: 0 -3px;
      transition: background 0.15s ease;
    }

    main {
      flex: 1;
      padding: 32px 20px 60px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      max-width: 720px;
      width: 100%;
      padding: clamp(24px, 5vw, 48px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .topic-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .topic-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.2rem, 3.5vw, 1.7rem);
      color: var(--accent);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--border);
      line-height: 1.3;
    }

    .exam-text {
      font-size: var(--fs);
      line-height: 1.75;
      color: var(--ink);
      transition: font-size 0.2s ease;
      overflow-wrap: break-word;
    }

    .placeholder {
      text-align: center;
      padding: 40px 20px;
    }

    .placeholder-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .placeholder h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .placeholder p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Tablet ────────────────────────── */
    @media (max-width: 768px) {
      .controls {
        padding: 12px 16px;
        gap: 8px;
      }

      .select-wrap {
        flex: 1 1 100%;
        max-width: 100%;
      }

      .controls-row {
        justify-content: center;
      }

      .tts-separator {
        display: none;
      }
    }

    /* ── Mobile ────────────────────────── */
    @media (max-width: 480px) {
      :root {
        --fs: 19px;
      }

      header {
        padding: 12px 16px 10px;
      }

      header h1 {
        font-size: 1.3rem;
      }

      .controls {
        padding: 10px 12px;
        gap: 8px;
        flex-direction: column;
      }

      .select-wrap {
        flex: 1 1 100%;
        max-width: 100%;
      }

      select {
        font-size: 1rem;
        padding: 12px 40px 12px 14px;
      }

      .controls-row {
        width: 100%;
        justify-content: center;
        gap: 8px;
      }

      .font-controls {
        gap: 4px;
      }

      .font-controls span {
        font-size: 0.7rem;
      }

      .tts-separator {
        display: none;
      }

      .tts-bar {
        width: 100%;
        justify-content: center;
        gap: 8px;
        padding: 6px 0;
        border-top: 1px solid var(--border);
        margin-top: 2px;
      }

      .btn-tts-play {
        width: 52px;
        height: 52px;
        font-size: 1.5rem;
      }

      .speed-display {
        font-size: 0.9rem;
        min-width: 44px;
      }

      .tts-status {
        width: 100%;
        text-align: center;
        font-size: 0.8rem;
      }

      main {
        padding: 16px 10px 40px;
      }

      .card {
        padding: 18px 16px;
        border-radius: 8px;
      }

      .topic-title {
        font-size: 1.1rem;
        margin-bottom: 16px;
        padding-bottom: 12px;
      }

      .exam-text {
        line-height: 1.85;
      }
    }

    /* ── Very small phones ─────────────── */
    @media (max-width: 360px) {
      :root {
        --fs: 17px;
      }

      header h1 {
        font-size: 1.15rem;
      }

      .controls {
        padding: 8px 10px;
      }

      .card {
        padding: 14px 12px;
      }
    }

    /* ── Active TTS word highlight ───────────── */
    .tts-active {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      border-radius: 4px;
      padding: 2px 4px;
    }

    .word-hint {
      margin: 12px 0 18px;
      padding: 10px 14px;
      border: 1.5px dashed var(--accent-light);
      background: #fff4ef;
      border-radius: 8px;
      font-size: .85rem;
    }

    /* ── Tip banner ───────────────────────── */
    .word-tip {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(181, 69, 27, 0.06) 0%, rgba(181, 69, 27, 0.02) 100%);
      border: 1px solid rgba(181, 69, 27, 0.15);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.4;
      animation: fadeIn 0.4s ease;
    }

    .word-tip-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .word-tip-dismiss {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 2px;
      opacity: 0.6;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .word-tip-dismiss:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <header>
    <h1>Oral Exam 3</h1>
    <p>IER — Group 8A</p>
  </header>

  <div class="controls">
    <div class="select-wrap">
      <select id="studentSelect" onchange="showText()">
        <option value="">— Select a student —</option>
        <option value="Carolina">Carolina</option>
        <option value="César">César</option>
        <option value="Chava">Chava</option>
        <option value="Daniel">Daniel</option>
        <option value="Ema">Ema</option>
        <option value="Fernanda">Fernanda</option>
        <option value="Gloria">Gloria</option>
        <option value="Joseph">Joseph</option>
        <option value="Karen">Karen</option>
        <option value="Leonardo">Leonardo</option>
        <option value="Monserrat">Monserrat</option>
        <option value="Neptalí">Neptalí</option>
        <option value="Paulina">Paulina</option>
      </select>
      <span class="select-arrow">▾</span>
    </div>

    <div class="controls-row">
      <div class="font-controls">
        <span>Size</span>
        <button class="btn btn-sm" onclick="changeFont(-2)" aria-label="Decrease font size">−</button>
        <span class="size-display" id="sizeDisplay">22</span>
        <button class="btn btn-sm" onclick="changeFont(2)" aria-label="Increase font size">+</button>
      </div>

      <div class="tts-separator"></div>

      <div class="tts-bar">
        <div class="tts-playback">
          <button class="btn btn-tts-play" id="btnPlay" onclick="toggleSpeech()" aria-label="Read aloud"
            title="Read aloud">▶</button>
          <button class="btn btn-tts-stop" id="btnStop" onclick="stopSpeech()" aria-label="Stop reading"
            title="Stop">■</button>
        </div>
        <div class="speed-wrap">
          <span class="speed-label">Speed</span>
          <button class="btn btn-sm" onclick="changeSpeed(-0.25)" aria-label="Decrease speed">−</button>
          <span class="speed-display" id="speedDisplay">0.85×</span>
          <button class="btn btn-sm" onclick="changeSpeed(0.25)" aria-label="Increase speed">+</button>
        </div>
        <span class="tts-status" id="ttsStatus"></span>
      </div>
    </div>
  </div>

  <main>
    <div class="card" id="card">
      <div class="placeholder">
        <div class="placeholder-icon">📖</div>
        <h2>Ready to read?</h2>
        <p>Select a student's name above to display their exam text.</p>
      </div>
    </div>
  </main>

  <script>
    const data = {
      "Carolina": {
        topic: "1. Martin Luther King Jr.",
        text: "“I have a dream that one day people will be judged not by the color of their skin but by the content of their character. We must walk together, fight injustice, and believe in freedom. The future belongs to equality and hope.”"
      },
      "Gloria": {
        topic: "2. Nelson Mandela",
        text: "“Courage is not the absence of fear, but the triumph over it. We must forgive, unite, and build a nation where freedom and justice guide us. Together, we can transform pain into peace and create a better tomorrow.”"
      },
      "César": {
        topic: "3. Malala Yousafzai",
        text: "“One child, one teacher, one book, and one pen can change the world. Education is the most powerful weapon against ignorance. We must raise our voices for girls’ rights and never stop believing in the power of learning.”"
      },
      "Neptalí": {
        topic: "4. John F. Kennedy",
        text: "“Ask not what your country can do for you—ask what you can do for your country. Each citizen has a duty to serve, to dream, and to act. Together, we can build a stronger and brighter nation.”"
      },
      "Fernanda": {
        topic: "5. Barack Obama",
        text: "“Yes, we can. We can change, we can build, we can dream. Hope is stronger than fear, and unity is stronger than division. Together, ordinary people can achieve extraordinary things.”"
      },
      "Leonardo": {
        topic: "6. Mother Teresa",
        text: "“Not all of us can do great things, but we can do small things with great love. Kindness is the language of the heart. When we serve others, we serve humanity and bring light into the world.”"
      },
      "Ema": {
        topic: "7. Albert Einstein",
        text: "“Imagination is more important than knowledge. Knowledge tells us what is, but imagination shows us what can be. Never stop questioning, never stop dreaming. Curiosity is the spark that moves humanity forward.”"
      },
      "Karen": {
        topic: "8. Steve Jobs",
        text: "“Stay hungry, stay foolish. Innovation comes from passion and courage. Don’t be afraid to follow your heart, even when the path is uncertain. The people who change the world are those who dare to think differently.”"
      },
      "Monserrat": {
        topic: "8. Steve Jobs",
        text: "“Stay hungry, stay foolish. Innovation comes from passion and courage. Don’t be afraid to follow your heart, even when the path is uncertain. The people who change the world are those who dare to think differently.”"
      },
      "Joseph": {
        topic: "9. Oprah Winfrey",
        text: "“The biggest adventure you can take is to live the life of your dreams. Believe in yourself, embrace challenges, and turn failures into lessons. Success is not about wealth, but about purpose and joy.”"
      },
      "Daniel": {
        topic: "9. Oprah Winfrey",
        text: "“The biggest adventure you can take is to live the life of your dreams. Believe in yourself, embrace challenges, and turn failures into lessons. Success is not about wealth, but about purpose and joy.”"
      },
      "Paulina": {
        topic: "10. Mahatma Gandhi",
        text: "“Be the change you wish to see in the world. Peace begins with each of us. Through nonviolence, truth, and compassion, we can transform society and inspire generations to walk the path of justice.”"
      },
      "Chava": {
        topic: "10. Mahatma Gandhi",
        text: "“Be the change you wish to see in the world. Peace begins with each of us. Through nonviolence, truth, and compassion, we can transform society and inspire generations to walk the path of justice.”"
      }
    };

    let fontSize = 22;
    const MIN = 14, MAX = 48;
    let speechRate = 0.85;
    const SPEED_MIN = 0.25, SPEED_MAX = 2;
    let currentUtterance = null;
    let isSpeaking = false;
    let isPaused = false;
    let currentText = '';
    let speechGeneration = 0; // prevents stale callbacks
    let tipDismissed = false;

    function showText() {
      stopSpeech();
      const name = document.getElementById('studentSelect').value;
      const card = document.getElementById('card');
      if (!name) {
        card.innerHTML = `<div class="placeholder"><div class="placeholder-icon">📖</div><h2>Ready to read?</h2><p>Select a student's name above to display their exam text.</p></div>`;
        currentText = '';
        return;
      }
      const entry = data[name];
      currentText = entry.text;
      const tipHTML = tipDismissed ? '' : `
        <div class="word-tip" id="wordTip">
          <span class="word-tip-icon">💡</span>
          <span>Tap or double click any word to hear its pronunciation individually.</span>
          <button class="word-tip-dismiss" onclick="dismissTip()" aria-label="Dismiss tip">✕</button>
        </div>`;
      card.innerHTML = `
      <div class="topic-label">Topic</div>
      <div class="topic-title">${entry.topic}</div>
      
      <p class="exam-text" id="examText" style="font-size:${fontSize}px">${entry.text}</p>
      ${tipHTML}
    `;
    }

    function dismissTip() {
      tipDismissed = true;
      const tip = document.getElementById('wordTip');
      if (tip) tip.style.display = 'none';
    }

    function changeFont(delta) {
      fontSize = Math.min(MAX, Math.max(MIN, fontSize + delta));
      document.documentElement.style.setProperty('--fs', fontSize + 'px');
      document.getElementById('sizeDisplay').textContent = fontSize;
      const t = document.getElementById('examText');
      if (t) t.style.fontSize = fontSize + 'px';
    }

    /* ── Text-to-Speech ────────────────────── */

    function getEnglishVoice() {
      const voices = speechSynthesis.getVoices();
      // Prefer high-quality English voices
      const preferred = voices.find(v => v.lang.startsWith('en') && v.name.includes('Daniel'));
      if (preferred) return preferred;
      // Prefer non-local (network) voices for better quality
      const networkEn = voices.find(v => v.lang.startsWith('en') && !v.localService);
      if (networkEn) return networkEn;
      return voices.find(v => v.lang.startsWith('en')) || null;
    }

    function wrapWordsInSpans(text) {
      const words = text.split(/\s+/);
      return words.map((w, i) => `<span class="tts-word" data-index="${i}">${w}</span>`).join(' ');
    }

    function highlightWord(index) {
      document.querySelectorAll('.tts-word.word-highlight').forEach(el => {
        el.classList.remove('word-highlight');
      });
      const target = document.querySelector(`.tts-word[data-index="${index}"]`);
      if (target) {
        target.classList.add('word-highlight');
        target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function clearHighlights() {
      document.querySelectorAll('.tts-word.word-highlight').forEach(el => {
        el.classList.remove('word-highlight');
      });
    }

    function updateTTSUI(state) {
      const btnPlay = document.getElementById('btnPlay');
      const status = document.getElementById('ttsStatus');

      switch (state) {
        case 'playing':
          btnPlay.textContent = '⏸';
          btnPlay.title = 'Pause';
          status.textContent = '🔊 Reading…';
          status.classList.add('speaking');
          break;
        case 'paused':
          btnPlay.textContent = '▶';
          btnPlay.title = 'Resume';
          status.textContent = '⏸ Paused';
          status.classList.remove('speaking');
          break;
        case 'idle':
        default:
          btnPlay.textContent = '▶';
          btnPlay.title = 'Read aloud';
          status.textContent = '';
          status.classList.remove('speaking');
          break;
      }
    }

    function toggleSpeech() {
      if (!currentText) return;

      if (isSpeaking && !isPaused) {
        speechSynthesis.pause();
        isPaused = true;
        updateTTSUI('paused');
        return;
      }

      if (isPaused) {
        speechSynthesis.resume();
        isPaused = false;
        updateTTSUI('playing');
        return;
      }

      startSpeech();
    }

    function startSpeech() {
      // Increment generation so any old callbacks become no-ops
      const gen = ++speechGeneration;

      // Cancel without triggering our own cleanup logic
      speechSynthesis.cancel();

      const examEl = document.getElementById('examText');
      if (!examEl || !currentText) return;

      // Wrap each word in a <span> for highlighting
      examEl.innerHTML = wrapWordsInSpans(currentText);
      examEl.style.fontSize = fontSize + 'px';

      const utterance = new SpeechSynthesisUtterance(currentText);
      utterance.lang = 'en-US';
      utterance.rate = speechRate;
      utterance.pitch = 1;

      const voice = getEnglishVoice();
      if (voice) utterance.voice = voice;

      const words = currentText.split(/\s+/);

      utterance.onboundary = function (e) {
        if (gen !== speechGeneration) return; // stale
        if (e.name === 'word') {
          const charIndex = e.charIndex;
          let cumulative = 0;
          for (let i = 0; i < words.length; i++) {
            if (cumulative >= charIndex) {
              highlightWord(i);
              break;
            }
            cumulative += words[i].length + 1;
          }
        }
      };

      utterance.onend = function () {
        if (gen !== speechGeneration) return; // stale — ignore
        isSpeaking = false;
        isPaused = false;
        clearHighlights();
        if (examEl) examEl.textContent = currentText;
        updateTTSUI('idle');
      };

      utterance.onerror = function (e) {
        if (gen !== speechGeneration) return; // stale — ignore
        // 'interrupted' and 'canceled' are expected when restarting
        if (e.error === 'interrupted' || e.error === 'canceled') return;
        isSpeaking = false;
        isPaused = false;
        clearHighlights();
        updateTTSUI('idle');
      };

      currentUtterance = utterance;
      isSpeaking = true;
      isPaused = false;
      updateTTSUI('playing');

      // Small delay to let cancel() complete before speaking again
      setTimeout(() => {
        if (gen !== speechGeneration) return;
        speechSynthesis.speak(utterance);
      }, 50);
    }

    function stopSpeech() {
      speechGeneration++; // invalidate any pending callbacks
      speechSynthesis.cancel();
      isSpeaking = false;
      isPaused = false;
      clearHighlights();
      updateTTSUI('idle');

      const examEl = document.getElementById('examText');
      if (examEl && currentText) {
        examEl.textContent = currentText;
        examEl.style.fontSize = fontSize + 'px';
      }
    }

    function changeSpeed(delta) {
      speechRate = Math.min(SPEED_MAX, Math.max(SPEED_MIN, +(speechRate + delta).toFixed(2)));
      document.getElementById('speedDisplay').textContent = speechRate + '×';

      // Restart with new speed if currently speaking
      if (isSpeaking && !isPaused) {
        startSpeech();
      }
    }

    // Ensure voices are loaded (some browsers load them async)
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = () => { /* voices ready */ };
    }

    // SINGLE WORD – select a word to hear pronunciation
    document.addEventListener('mouseup', () => {
      const sel = window.getSelection();
      const word = sel.toString().trim();
      if (!word || word.includes(' ') || word.length < 2) return;

      const range = sel.getRangeAt(0);
      const span = document.createElement('span');
      span.className = 'tts-active';
      span.textContent = word;

      range.deleteContents();
      range.insertNode(span);
      sel.removeAllRanges();

      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-US';
      u.rate = Math.max(0.6, speechRate - 0.1);
      const voice = getEnglishVoice();
      if (voice) u.voice = voice;

      u.onend = () => span.replaceWith(word);
      speechSynthesis.speak(u);
    });

    // MOBILE TAP – tap a word to hear its pronunciation
    document.addEventListener('touchend', (e) => {
      if (isSpeaking) return;
      if (e.changedTouches.length !== 1) return;

      const touch = e.changedTouches[0];
      const examEl = document.getElementById('examText');
      if (!examEl) return;

      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      if (!target || !examEl.contains(target)) return;

      let range;
      if (document.caretRangeFromPoint) {
        range = document.caretRangeFromPoint(touch.clientX, touch.clientY);
      } else if (document.caretPositionFromPoint) {
        const pos = document.caretPositionFromPoint(touch.clientX, touch.clientY);
        if (pos) {
          range = document.createRange();
          range.setStart(pos.offsetNode, pos.offset);
          range.setEnd(pos.offsetNode, pos.offset);
        }
      }
      if (!range || !range.startContainer || range.startContainer.nodeType !== 3) return;

      const textNode = range.startContainer;
      const offset = range.startOffset;
      const fullText = textNode.textContent;

      let start = offset, end = offset;
      while (start > 0 && /\S/.test(fullText[start - 1])) start--;
      while (end < fullText.length && /\S/.test(fullText[end])) end++;

      const word = fullText.slice(start, end).replace(/[.,;:!?"'()]/g, '');
      if (!word || word.length < 2) return;

      const before = fullText.slice(0, start);
      const after = fullText.slice(end);
      const wordRaw = fullText.slice(start, end);

      const span = document.createElement('span');
      span.className = 'tts-active';
      span.textContent = wordRaw;

      const parent = textNode.parentNode;
      const beforeNode = document.createTextNode(before);
      const afterNode = document.createTextNode(after);
      parent.replaceChild(afterNode, textNode);
      parent.insertBefore(span, afterNode);
      parent.insertBefore(beforeNode, span);

      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-US';
      u.rate = Math.max(0.6, speechRate - 0.1);
      const voice = getEnglishVoice();
      if (voice) u.voice = voice;

      u.onend = () => {
        parent.replaceChild(document.createTextNode(before + wordRaw + after), beforeNode);
        if (span.parentNode) span.remove();
        if (afterNode.parentNode) afterNode.remove();
      };
      u.onerror = u.onend;

      speechSynthesis.speak(u);
    });

  </script>
